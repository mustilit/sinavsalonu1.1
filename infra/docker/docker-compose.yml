services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sinavsalonu_v2}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    image: dal-backend:dev
    build:
      context: ../../apps/backend
      dockerfile: ../../infra/docker/backend.Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dal?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-development}
      CLIENT_URL: ${CLIENT_URL:-"http://localhost:5173"}
      REDIS_DISABLED: ${REDIS_DISABLED:-"1"}
      CRON_DISABLED: ${CRON_DISABLED:-"1"}
    ports:
      - "3000:3000"
    restart: on-failure

  worker:
    image: dal-backend:dev
    command: npm run start:worker
    depends_on:
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dal?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3010:3010"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3010/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  dlq-worker:
    image: dal-backend:dev
    command: npm run start:dlq
    depends_on:
      redis:
        condition: service_started
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/dal?schema=public"
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: "redis://redis:6379"
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-""}
    restart: unless-stopped

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: ../../infra/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-"http://127.0.0.1:3000"}
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-"http://127.0.0.1:3000"}
    ports:
      - "5173:5173"
    restart: on-failure

volumes:
  db_data: