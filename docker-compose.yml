services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sinavsalonu_v2
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: infra/docker/backend.Dockerfile
    image: dal-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/sinavsalonu_v2?schema=public"
      JWT_SECRET: "super_secret_key"
      PORT: "3000"
      NODE_ENV: "development"
      CLIENT_URL: "http://localhost:5173"
      REDIS_DISABLED: "1"
      CRON_DISABLED: "1"
    ports:
      - "3000:3000"
    restart: on-failure

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  worker:
    image: dal-backend
    command: npm run start:worker
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
    environment:
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3010:3010"
    restart: unless-stopped

  dlq-worker:
    image: dal-backend
    command: npm run start:dlq
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
    environment:
      REDIS_URL: "redis://redis:6379"
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-""}
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: infra/docker/frontend.Dockerfile
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:3000"
    ports:
      - "5173:5173"
    restart: on-failure

volumes:
  db_data:
